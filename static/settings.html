<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Sideeye вЂ” Settings</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;

      font-size: 14px;

    .site-nav { font-size: 14px; color: #888888; display: flex; gap: 24px; }

      font-size: 32px;

    /* ГўвЂќв‚¬ГўвЂќв‚¬ Tabs ГўвЂќв‚¬ГўвЂќв‚¬ */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #1e1e1e;

    .tab-btn {

      padding: 8px 20px 8px 0;

    .tab-btn:hover { color: #888888; }
    .tab-btn.active { color: #EAEAEA; border-bottom-color: #EAEAEA; }

    .tab-panel { display: none; }

    /* ГўвЂќв‚¬ГўвЂќв‚¬ Form ГўвЂќв‚¬ГўвЂќв‚¬ */
    .field { margin-bottom: 36px; }

    label {
      display: block;

      width: 100%;

    /* ГўвЂќв‚¬ГўвЂќв‚¬ Temperature ГўвЂќв‚¬ГўвЂќв‚¬ */
    .temp-row {
      display: flex;

    input[type="range"] {
      flex: 1;

    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;

    /* ГўвЂќв‚¬ГўвЂќв‚¬ Toolbar ГўвЂќв‚¬ГўвЂќв‚¬ */

    button {

    button:hover { border-color: #666666; }
    button:disabled { opacity: 0.3; cursor: default; }

    .save-status {
      font-family: 'JetBrains Mono', monospace;

    }

    /* ГўвЂќв‚¬ГўвЂќв‚¬ Feed list ГўвЂќв‚¬ГўвЂќв‚¬ */
    .feed-row {
      display: grid;
      grid-template-columns: 1fr 2fr 100px 28px;
      gap: 8px;
      align-items: center;

    }

    .feed-row input[type="text"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: #111111;
      border: 1px solid #1e1e1e;

      padding: 6px 10px;
      border-radius: 3px;

      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;

      text-transform: uppercase;

      grid-template-columns: 1fr 2fr 100px 28px;

      cursor: pointer;

      padding: 0;

    .feed-delete:hover { color: #888888; border: none; }

    /* ГўвЂќв‚¬ГўвЂќв‚¬ Footer ГўвЂќв‚¬ГўвЂќв‚¬ */
    footer {
      margin-top: 64px;
      padding: 24px 0 48px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #888888;

    }

<body>
<div class="page">

  <header>
    <div class="site-name">Sideeye</div>
    <nav class="site-nav">
      <a href="/static/index.html">Feed</a>
      <a href="/static/interests.html">Interests</a>
      <a href="/static/settings.html" class="active">Settings</a>
    </nav>
  </header>

  <div class="title-block">
    <h1>Settings</h1>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ai', this)">AI</button>
    <button class="tab-btn" onclick="switchTab('sources', this)">Sources</button>
  </div>

  <!-- ГўвЂќв‚¬ГўвЂќв‚¬ AI tab ГўвЂќв‚¬ГўвЂќв‚¬ -->
  <div class="tab-panel active" id="tab-ai">
    <div class="field">
      <label>System prompt</label>
      <textarea id="promptInput" spellcheck="false"></textarea>
    </div>

    <div class="field">
      <label>Temperature Гўв‚¬вЂќ how creative / unpredictable the AI is</label>
      <div class="temp-row">
        <input type="range" id="tempSlider" min="0" max="2" step="0.05" value="0.85"
               oninput="document.getElementById('tempValue').textContent = parseFloat(this.value).toFixed(2)">
        <span class="temp-value" id="tempValue">0.85</span>
      </div>
      <div class="temp-labels">
        <span>0 Гўв‚¬вЂќ deterministic</span>
        <span>1 Гўв‚¬вЂќ balanced</span>
        <span>2 Гўв‚¬вЂќ chaotic</span>
      </div>
    </div>

    <div class="toolbar">
      <button id="saveAiBtn" onclick="saveAi()">save</button>
      <button onclick="resetAi()">reset to default</button>
      <span class="save-status" id="aiStatus"></span>
    </div>
  </div>

  <!-- ГўвЂќв‚¬ГўвЂќв‚¬ Sources tab ГўвЂќв‚¬ГўвЂќв‚¬ -->
  <div class="tab-panel" id="tab-sources">
    <div class="feed-col-header">
      <span>Name</span>
      <span>URL</span>
      <span>Category</span>
      <span></span>
    </div>
    <div id="feedList"></div>

    <div class="toolbar" style="margin-top: 16px;">
      <button onclick="addFeedRow()">+ add</button>
      <button id="saveFeedsBtn" onclick="saveFeeds()">save</button>
      <span class="save-status" id="feedsStatus"></span>
    </div>
  </div>

  <footer>Sideeye / settings</footer>

</div>
<script>
  const DEFAULT_PROMPT = "You are a dry-witted news commentator. Given a headline and summary, reply with a single sharp remark (1-2 sentences). Do not repeat the headline. No hashtags, no emojis, no quotation marks.";
  const DEFAULT_TEMP   = 0.85;

  // ГўвЂќв‚¬ГўвЂќв‚¬ Tabs ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => { p.style.display = 'none'; });
    btn.classList.add('active');
    document.getElementById(`tab-${name}`).style.display = 'block';
  }

  // ГўвЂќв‚¬ГўвЂќв‚¬ AI tab ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  async function loadAi() {
    try {
      const res  = await fetch('/settings');
      const data = await res.json();
      document.getElementById('promptInput').value = data.system_prompt || DEFAULT_PROMPT;
      const temp = parseFloat(data.temperature ?? DEFAULT_TEMP);
      document.getElementById('tempSlider').value          = temp;
      document.getElementById('tempValue').textContent     = temp.toFixed(2);
    } catch (e) {
      document.getElementById('aiStatus').textContent = `load error: ${e.message}`;
    }
  }

  async function saveAi() {
    const prompt = document.getElementById('promptInput').value.trim();
    const temp   = parseFloat(document.getElementById('tempSlider').value);
    const status = document.getElementById('aiStatus');
    const btn    = document.getElementById('saveAiBtn');

    if (!prompt) { status.textContent = 'prompt cannot be empty'; return; }

    btn.disabled = true;
    status.textContent = 'savingГўв‚¬В¦';

    try {
      const res = await fetch('/settings', {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ system_prompt: prompt, temperature: temp }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      status.textContent = 'saved';
      setTimeout(() => { status.textContent = ''; }, 2000);
    } catch (e) {
      status.textContent = `error: ${e.message}`;
    } finally {
      btn.disabled = false;
    }
  }

  function resetAi() {
    document.getElementById('promptInput').value         = DEFAULT_PROMPT;
    document.getElementById('tempSlider').value          = DEFAULT_TEMP;
    document.getElementById('tempValue').textContent     = DEFAULT_TEMP.toFixed(2);
  }

  // ГўвЂќв‚¬ГўвЂќв‚¬ Sources tab ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  function makeFeedRow(name = '', url = '', category = 'world') {
    const row = document.createElement('div');
    row.className = 'feed-row';
    row.innerHTML = `
      <input type="text" placeholder="BBC World News"   value="${escHtml(name)}"     class="feed-name">
      <input type="text" placeholder="https://Гўв‚¬В¦/rss"   value="${escHtml(url)}"      class="feed-url">
      <input type="text" placeholder="world"            value="${escHtml(category)}" class="feed-cat">
      <button class="feed-delete" title="remove" onclick="this.closest('.feed-row').remove()">ГўЕ“вЂў</button>
    `;
    return row;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadFeeds() {
    try {
      const res   = await fetch('/feeds');
      const feeds = await res.json();
      const list  = document.getElementById('feedList');
      list.innerHTML = '';
      feeds.forEach(f => list.appendChild(makeFeedRow(f.name, f.url, f.category)));
    } catch (e) {
      document.getElementById('feedsStatus').textContent = `load error: ${e.message}`;
    }
  }

  function addFeedRow() {
    document.getElementById('feedList').appendChild(makeFeedRow());
  }

  async function saveFeeds() {
    const rows  = document.querySelectorAll('.feed-row');
    const feeds = [];
    let valid   = true;

    rows.forEach(row => {
      const name     = row.querySelector('.feed-name').value.trim();
      const url      = row.querySelector('.feed-url').value.trim();
      const category = row.querySelector('.feed-cat').value.trim() || 'world';
      if (name && url) {
        feeds.push({ name, url, category });
      } else if (name || url) {
        valid = false;
      }
    });

    const status = document.getElementById('feedsStatus');
    const btn    = document.getElementById('saveFeedsBtn');

    if (!valid) { status.textContent = 'fill in both name and URL for each row'; return; }
    if (feeds.length === 0) { status.textContent = 'add at least one feed'; return; }

    btn.disabled = true;
    status.textContent = 'savingГўв‚¬В¦';

    try {
      const res = await fetch('/feeds', {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(feeds),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      status.textContent = 'saved Гўв‚¬вЂќ fetching new feedsГўв‚¬В¦';
      setTimeout(() => { status.textContent = ''; }, 3000);
    } catch (e) {
      status.textContent = `error: ${e.message}`;
    } finally {
      btn.disabled = false;
    }
  }

  // ГўвЂќв‚¬ГўвЂќв‚¬ Init ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      const aiActive = document.getElementById('tab-ai').classList.contains('active');
      if (aiActive) saveAi(); else saveFeeds();
    }
  });

  loadAi();
  loadFeeds();

  // Set initial panel visibility explicitly via inline styles
  document.querySelectorAll('.tab-panel').forEach(p => { p.style.display = 'none'; });
  document.getElementById('tab-ai').style.display = 'block';
</script>
