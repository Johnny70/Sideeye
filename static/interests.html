<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sideeye — Interests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: #0B0B0B;
      color: #EAEAEA;
      min-height: 100vh;
      padding: 0 24px;
    }

    a { color: #EAEAEA; text-decoration: none; }
    a:hover { color: #888888; }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header { padding: 48px 0; }

    .site-name {
      font-size: 14px;
      color: #888888;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    .site-nav {
      font-size: 14px;
      color: #888888;
      display: flex;
      gap: 24px;
    }

    .site-nav a { color: #888888; }
    .site-nav a:hover { color: #EAEAEA; }
    .site-nav a.active { color: #EAEAEA; }

    /* ── Title block ── */
    .title-block { margin-bottom: 48px; }

    h1 {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .subtitle { font-size: 15px; color: #888888; }

    .meta-row {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #888888;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 24px;
    }

    input[type="search"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 6px 10px;
      background: #111111;
      border: 1px solid #222222;
      color: #EAEAEA;
      border-radius: 3px;
      width: 220px;
    }

    input[type="search"]:focus { outline: none; border-color: #444444; }

    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #888888;
      cursor: pointer;
      border-radius: 3px;
    }

    button:hover { border-color: #555555; color: #EAEAEA; }
    button:disabled { opacity: 0.3; cursor: default; }

    button.run {
      border-color: #444444;
      color: #EAEAEA;
    }

    .save-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #888888;
      margin-left: 8px;
    }

    /* ── List ── */
    .list-header {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 0 0 8px;
      border-bottom: 1px solid #1e1e1e;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #444444;
    }

    .list-header .col-topic { flex: 1; }
    .list-header .col-score { width: 130px; text-align: right; }
    .list-header .col-del   { width: 24px; }

    #interestsList { margin-top: 4px; }

    .interest-row {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #111111;
    }

    .interest-row.hidden { display: none; }

    .int-topic {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      color: #EAEAEA;
      padding: 3px 0;
    }

    .int-topic:focus { outline: none; border-bottom-color: #444444; }

    .score-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 130px;
      flex-shrink: 0;
    }

    .score-bar {
      display: flex;
      gap: 2px;
      align-items: center;
      flex: 1;
    }

    .score-seg {
      flex: 1;
      height: 10px;
      border-radius: 1px;
      background: #1c1c1c;
      transition: background 0.12s;
    }

    .score-seg.on { background: #EAEAEA; }

    .score-seg { cursor: pointer; }
    .score-seg:hover { background: #444; }

    .int-score {
      width: 36px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      color: #EAEAEA;
      padding: 3px 0;
      text-align: right;
    }

    .int-score:focus { outline: none; border-bottom-color: #444444; }

    .int-delete {
      width: 24px;
      font-size: 11px;
      color: #2a2a2a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-align: center;
    }

    .int-delete:hover { color: #888888; }

    .empty {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #888888;
      padding: 32px 0;
    }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      padding: 24px 0 48px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #888888;
      border-top: 1px solid #161616;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="site-name">Sideeye</div>
    <nav class="site-nav">
      <a href="/static/index.html">Feed</a>
      <a href="/static/interests.html" class="active">Interests</a>
      <a href="/static/settings.html">Settings</a>
    </nav>
  </header>

  <div class="title-block">
    <h1>Interests</h1>
    <p class="subtitle">Topics and weights used to rank articles. Score 0–10.</p>
  </div>

  <div class="meta-row" id="metaRow">
    <span id="countLabel">loading…</span>
  </div>

  <div class="toolbar">
    <input type="search" id="filterInput" placeholder="filter topics…">
    <button onclick="addRow()">+ add</button>
    <button class="run" id="saveBtn" onclick="save()">save</button>
    <span class="save-status" id="saveStatus"></span>
  </div>

  <div class="list-header">
    <span class="col-topic">topic</span>
    <span class="col-score">score</span>
    <span class="col-del"></span>
  </div>

  <div id="interestsList"><div class="empty">Loading…</div></div>

  <footer>
    Sideeye / interests
  </footer>

</div>
<script>
  async function load() {
    try {
      const res = await fetch('/interests');
      const data = await res.json();
      render(data.interests || []);
    } catch (e) {
      document.getElementById('interestsList').innerHTML =
        `<div class="empty">Could not load interests: ${e.message}</div>`;
    }
  }

  function render(interests) {
    const list = document.getElementById('interestsList');
    list.innerHTML = '';
    interests.forEach(item => list.appendChild(makeRow(item.topic, item.score)));
    updateCount();
  }

  function makeRow(topic = '', score = 5) {
    const row = document.createElement('div');
    row.className = 'interest-row';
    const segs = Array.from({ length: 10 }, (_, i) =>
      `<span class="score-seg${i < score ? ' on' : ''}" onclick="setScore(this, ${i + 1})"></span>`
    ).join('');
    row.innerHTML = `
      <input type="text" class="int-topic" value="${escHtml(topic)}" placeholder="topic name"
             oninput="applyFilter()">
      <div class="score-cell">
        <div class="score-bar">${segs}</div>
        <input type="number" class="int-score" value="${score}" min="0" max="10"
               oninput="updateBar(this.closest('.interest-row'))">
      </div>
      <button class="int-delete" title="remove" onclick="removeRow(this)">✕</button>
    `;
    return row;
  }

  function updateBar(row) {
    const raw   = parseInt(row.querySelector('.int-score').value, 10);
    const score = isNaN(raw) ? 0 : Math.min(10, Math.max(0, raw));
    row.querySelectorAll('.score-seg').forEach((seg, i) => {
      seg.classList.toggle('on', i < score);
    });
  }

  function setScore(seg, score) {
    const row = seg.closest('.interest-row');
    row.querySelector('.int-score').value = score;
    updateBar(row);
  }

  function addRow() {
    const list = document.getElementById('interestsList');
    // Clear empty placeholder if present
    if (list.querySelector('.empty')) list.innerHTML = '';
    // Clear filter so new row is visible
    document.getElementById('filterInput').value = '';
    applyFilter();
    const row = makeRow();
    list.appendChild(row);
    row.querySelector('.int-topic').focus();
    row.scrollIntoView({ block: 'nearest' });
    updateCount();
  }

  function removeRow(btn) {
    btn.closest('.interest-row').remove();
    updateCount();
  }

  function applyFilter() {
    const q = document.getElementById('filterInput').value.toLowerCase();
    document.querySelectorAll('.interest-row').forEach(row => {
      const text = row.querySelector('.int-topic').value.toLowerCase();
      row.classList.toggle('hidden', q.length > 0 && !text.includes(q));
    });
  }

  function updateCount() {
    const total = document.querySelectorAll('.interest-row').length;
    document.getElementById('countLabel').textContent = `${total} topics`;
  }

  async function save() {
    const rows = document.querySelectorAll('.interest-row');
    const interests = [];
    rows.forEach(row => {
      const topic = row.querySelector('.int-topic').value.trim();
      const raw   = parseInt(row.querySelector('.int-score').value, 10);
      const score = isNaN(raw) ? 5 : Math.min(10, Math.max(0, raw));
      if (topic) interests.push({ topic, score });
    });

    const status = document.getElementById('saveStatus');
    const btn    = document.getElementById('saveBtn');
    btn.disabled = true;
    status.textContent = 'saving…';

    try {
      const res = await fetch('/interests', {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ interests }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      status.textContent = 'saved';
      setTimeout(() => { status.textContent = ''; }, 2000);
    } catch (e) {
      status.textContent = `error: ${e.message}`;
    } finally {
      btn.disabled = false;
    }
  }

  function escHtml(str) {
    return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('filterInput').addEventListener('input', applyFilter);
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
  });

  load();
</script>
</body>
</html>
